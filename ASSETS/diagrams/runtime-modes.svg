<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Runtime shape decides whether bytecode savings survive</title>
  <desc id="desc">JMOA optimized output can be materialized as expanded classpath, corrected fat JAR, or exploded Boot app. Each deployment shape maps to a confirmed case study, while PetClinic fat JAR is shown as the negative control.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="820" fill="#f8fafc"/>
  <text x="70" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#172033">Runtime Shape Decides Whether Bytecode Savings Survive</text>
  <text x="72" y="136" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">JMOA must materialize optimized bytecode into the deployment mode the service actually uses.</text>
  <rect x="610" y="170" width="380" height="86" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="223" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#172033">JMOA optimized output</text>
  <line x1="800" y1="256" x2="330" y2="372" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="800" y1="256" x2="780" y2="372" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="800" y1="256" x2="1230" y2="372" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="160" y="390" width="340" height="230" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="182" y="414" width="78" height="8" rx="4" fill="#2563eb"/>
    <text x="330" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#172033">Expanded classpath</text>
    <text x="330" y="518" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#2563eb">Patient-service</text>
    <text x="330" y="552" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">confirmed CDS win</text>
    <text x="330" y="602" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#2563eb">~4.2-4.4 MB</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="610" y="390" width="340" height="230" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="632" y="414" width="78" height="8" rx="4" fill="#0891b2"/>
    <text x="780" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#172033">Corrected fat JAR</text>
    <text x="780" y="518" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#0891b2">Doctor-service</text>
    <text x="780" y="552" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">confirmed CDS win</text>
    <text x="780" y="602" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0891b2">~2.7 MB</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1060" y="390" width="340" height="230" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="1082" y="414" width="78" height="8" rx="4" fill="#059669"/>
    <text x="1230" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#172033">Exploded Boot app</text>
    <text x="1230" y="518" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#059669">PetClinic</text>
    <text x="1230" y="552" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">confirmed no-CDS win</text>
    <text x="1230" y="602" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#059669">~4.6 MB</text>
  </g>
  <rect x="1060" y="670" width="340" height="70" rx="14" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="1230" y="698" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#991b1b">PetClinic fat JAR was the negative</text>
  <text x="1230" y="724" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#991b1b">control, not the final claim.</text>
</svg>
